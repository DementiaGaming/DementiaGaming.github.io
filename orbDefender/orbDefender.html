<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orb Defender</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

</head>
<style>
    #leaderboardContainer {
        z-index: 1000;
    }
</style>
<body>
    <div class="fixed text-white text-sm ml-2 mt-1 select-none">
        <span>Score: </span><span id="scoreEl">0</span>
    </div>

    <div class="fixed top-1 right-2 text-white text-sm select-none">
        <span>Time: </span><span id="timeEl">0:00</span>
    </div>

    <div class="fixed inset-0 flex items-center justify-center select-none" id="modalEl">
        <div class="bg-white max-w-md w-full p-6 text-center">
            <h1 class="text-4xl font-bold leading-none" id="bigScoreEl">0</h1>
            <p class="text-sm text-gray-700 mb-4">Points</p>
            <div>
                <button class="bg-blue-500 text-white w-full py-3 rounded-full text-sm" id="startGameButton">Start Game</button>
            </div>
        </div>
    </div>

    <div class="fixed top-7 right-5 bg-gray-800 text-white p-4 rounded-lg shadow-lg w-80" id="leaderboardContainer">
        <h2 class="text-lg font-bold mb-2">Leaderboard</h2>
        <ul id="leaderboard" class="text-sm">
            <!-- Scores will be dynamically added here -->
        </ul>
    </div>

    <canvas id="canvas"></canvas>
    
    <div class="level-indicator">Level: <span id="levelEl">1</span></div>
    <div class="xp-container">
        <div class="xp-bar" id="xpBar"></div>
    </div>

    <div id="achievement-popup" class="popup">
        <span id="achievement-text"></span>
    </div>
    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" integrity="sha512-7eHRwcbYkK4d9g/6tD/mhkf++eoTHwpNM9woBxtPUBWm67zeAfFC+HrdoE2GanKeocly/VxeLvIqwvCdk7qScg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
    <script src="../achievementsPage/achievements.js"></script>
</body>
<script src="https://cdn.tailwindcss.com"></script>
</html>
