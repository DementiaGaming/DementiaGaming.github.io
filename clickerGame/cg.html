<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="score">$0</div>
    <div class="shop">
        <div class="item" id="item1">
            <button class="buy-button" id="autoClickerBuy">Auto Clicker</button>
            <div class="price">$50</div>
            <div class="amount" id="ownedAC">Owned: 0</div>
        </div>
        <div class="item" id="item2">
            <button class="buy-button" id="clickMultiplierBuy">Click Multiplier</button>
            <div class="price">$100</div>
            <div class="amount" id="ownedCM">1.0x</div>
        </div>
        <div class="item" id="item3">
            <button class="buy-button" id="ultraBoostBuy">Ultra Boost</button>
            <div class="price">$100,000</div>
            <div class="amount" id="ultraboostIndicator">Disabled</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
