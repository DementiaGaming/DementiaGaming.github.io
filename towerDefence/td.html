<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defence</title>
    <link rel="stylesheet" href="tdStyle.css">
</head>
<body>
    <div class="fixed text-black font-bold ml-20 mt-1 select-none">
        <span id="roundPrompt">Press E to start next round</span>
    </div>
    <div class="fixed text-black font-bold top-1 right-2 select-none">
        <span id="roundCounter">Round: 1 </span><span id="money">Money: 0 </span><span id="lives">Lives: 100</span>
    </div>
    <div class="ui-container">
        <!-- Description Box -->
        <div class="description-box" id="descriptionBox">
            Hover over a button to see details!
        </div>

        <!-- Upgrade Buttons -->
        <div class="upgrade-container">
            <button class="upgrade-button" id="upgradeSpeedT1"
            onmouseover="updateDescription('Increases the attack speed of tower 1')"
            onmouseout="resetDescription()">$100</button>
            <button class="upgrade-button" id="upgradeDamageT1"
            onmouseover="updateDescription('Increases the damage of tower 1')"
            onmouseout="resetDescription()">$100</button>
            <button class="upgrade-button" id="upgradeAccuracyT1"
            onmouseover="updateDescription('Increases the accuracy of tower 1')"
            onmouseout="resetDescription()">$100</button>
        </div>
    </div>
    <canvas id="canvas"></canvas>
    <script src="script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
