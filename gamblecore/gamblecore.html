<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GambleCore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slot-machine">
        <h1 id="gambleMessage">Let's go gambling</h1>
        <div class="indicators">
            <div class="money" id="money">Money: $0</div>
            <div class="cost">Cost to Spin: $10</div>
        </div>
        <div class="reels">
            <div class="reel" id="slot1">🍒</div>
            <div class="reel" id="slot2">💎</div>
            <div class="reel" id="slot3">⭐</div>
        </div>
        <button id="spin">Spin</button>
        <div class="win-indicator">You won $0!</div>
    </div>
    <div id="achievement-popup" class="popup">
        <span id="achievement-text"></span>
    </div>
    <script src="script.js"></script>
    <script src="../achievementsPage/achievements.js"></script>
</body>
</html>
