<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Authentication Container -->
    <div id="auth-container" class="auth-container">
        <!-- Login and Signup Form -->
        <div id="login-signup">
            <h1 id="welcome-msg">Welcome</h1>
            <!-- Sign-in Form -->
            <div id="signin-form">
                <form id="login-form" class="auth-form">
                    <input type="text" id="login-username-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="button" onclick="login()">Login</button>
                    <p class="switch-text">Don't have an account? <a onclick="showForm('signup')">Sign up</a></p>
                </form>
            </div>

            <!-- Sign-up Form -->
            <div id="signup-form" class="auth-form hidden">
                <input type="text" id="signup-username" placeholder="Username" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="button" onclick="signUp()">Sign Up</button>
                <p class="switch-text">Have an account? <a onclick="showForm('login')">Sign in</a></p>
            </div>
        </div>
    </div>

    <!-- Signed-in View -->
    <div id="signed-in-view" class="auth-container hidden">
        <h1>Welcome, <span id="username-display"></span></h1>
        <button onclick="goHome()">Home</button>
        <button onclick="logOut()">Logout</button>
    </div>

    <script src="settings.js"></script>
</body>
</html>
